kind = "web"
previewPath = "/"
title = "LifeLedger"
version = "1.0.0"
id = "artifacts/life-ledger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24846

[services.development]
run = "pnpm --filter @workspace/life-ledger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/life-ledger", "run", "build" ]
publicDir = "artifacts/life-ledger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24846"
BASE_PATH = "/"
